schema {
  query: Query
  mutation: Mutation
}

type Address {
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
  isResidential: Boolean!
  contactName: String
  companyName: String
  phone: String
  email: String
  geoLocation: GeoLocation @cost(weight: "10")
}

type Depot {
  id: UUID!
  name: String!
  addressId: UUID!
  address: Address
  operatingHours: [OperatingHours!]
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime
}

type Driver {
  id: UUID!
  firstName: String!
  lastName: String!
  displayName: String! @cost(weight: "10")
  phone: String
  email: String
  licenseNumber: String!
  licenseExpiryDate: DateTime
  photoUrl: String
  zoneId: UUID!
  depotId: UUID!
  status: DriverStatus!
  userId: UUID!
  zoneName: String @cost(weight: "10")
  depotName: String @cost(weight: "10")
  userName: String @cost(weight: "10")
  availabilitySchedule: [DriverAvailability!] @cost(weight: "10")
  createdAt: DateTime!
  updatedAt: DateTime
}

type DriverAvailability {
  id: UUID!
  dayOfWeek: DayOfWeek!
  shiftStart: TimeSpan
  shiftEnd: TimeSpan
  isAvailable: Boolean!
}

type GeoLocation {
  latitude: Float!
  longitude: Float!
}

type Mutation @authorize(roles: [ "Admin" ]) {
  createDepot(input: CreateDepotInput!): Depot! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateDepot(id: UUID! input: UpdateDepotInput!): Depot @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteDepot(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  createDriver(input: CreateDriverInput!): Driver! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateDriver(id: UUID! input: UpdateDriverInput!): Driver! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteDriver(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  registerParcel(input: RegisterParcelInput!): RegisteredParcel! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  updateParcel(input: UpdateParcelInput!): ParcelDetail @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  cancelParcel(input: CancelParcelInput!): ParcelDetail @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  createRoute(input: CreateRouteInput!): Route! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  createUser(input: CreateUserInput!): UserManagementUser! @cost(weight: "10")
  updateUser(input: UpdateUserInput!): UserManagementUser! @cost(weight: "10")
  deactivateUser(userId: UUID!): UserManagementUser! @cost(weight: "10")
  sendPasswordResetEmail(userId: UUID!): UserActionResultDto! @cost(weight: "10")
  requestPasswordReset(email: String!): UserActionResultDto! @allowAnonymous @cost(weight: "10")
  completePasswordReset(input: CompletePasswordResetInput!): UserActionResultDto! @allowAnonymous @cost(weight: "10")
  createVehicle(input: CreateVehicleInput!): Vehicle! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateVehicle(id: UUID! input: UpdateVehicleInput!): Vehicle @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteVehicle(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  createZone(input: CreateZoneInput!): Zone! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateZone(id: UUID! input: UpdateZoneInput!): Zone @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteZone(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
}

type OperatingHours {
  dayOfWeek: DayOfWeek!
  openTime: TimeSpan
  closedTime: TimeSpan
  isClosed: Boolean!
}

type ParcelChangeHistory {
  action: String!
  fieldName: String!
  beforeValue: String
  afterValue: String
  changedAt: DateTime!
  changedBy: String
}
type ParcelDetail {
  id: UUID!
  trackingNumber: String!
  status: String!
  shipperAddressId: UUID!
  serviceType: String!
  weight: Decimal!
  weightUnit: String!
  length: Decimal!
  width: Decimal!
  height: Decimal!
  dimensionUnit: String!
  declaredValue: Decimal!
  currency: String!
  description: String
  parcelType: String
  cancellationReason: String
  estimatedDeliveryDate: DateTime!
  deliveryAttempts: Int!
  zoneId: UUID!
  zoneName: String
  depotId: UUID!
  depotName: String
  createdAt: DateTime!
  lastModifiedAt: DateTime
  canEdit: Boolean!
  canCancel: Boolean!
  recipientAddress: ParcelDetailAddress!
  changeHistory: [ParcelChangeHistory!]!
}

type ParcelDetailAddress {
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
  isResidential: Boolean!
  contactName: String
  companyName: String
  phone: String
  email: String
}

type ParcelImport {
  id: UUID!
  fileName: String!
  fileFormat: String!
  status: String!
  totalRows: Int!
  processedRows: Int!
  importedRows: Int!
  rejectedRows: Int!
  depotName: String
  failureMessage: String
  createdAt: DateTime!
  startedAt: DateTime
  completedAt: DateTime
  createdTrackingNumbers: [String!]!
  rowFailuresPreview: [ParcelImportRowFailurePreview!]!
}

type ParcelImportHistory {
  id: UUID!
  fileName: String!
  fileFormat: String!
  status: String!
  totalRows: Int!
  processedRows: Int!
  importedRows: Int!
  rejectedRows: Int!
  depotName: String
  createdAt: DateTime!
  startedAt: DateTime
  completedAt: DateTime
}

type ParcelImportRowFailurePreview {
  rowNumber: Int!
  errorMessage: String!
  originalRowValues: String!
}

type ParcelRouteOption {
  id: UUID!
  trackingNumber: String!
  weight: Decimal!
  weightUnit: WeightUnit!
}

type Query @authorize(roles: [ "Admin" ]) {
  depots(where: DepotFilterInput @cost(weight: "10") order: [DepotSortInput!] @cost(weight: "10")): [Depot!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  depot(id: UUID!): Depot @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  drivers(order: [DriverSortInput!] @cost(weight: "10") where: DriverFilterInput @cost(weight: "10")): [Driver!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  driver(id: UUID!): Driver @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  parcel(id: UUID!): ParcelDetail @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  parcelsForRouteCreation: [ParcelRouteOption!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  registeredParcels(where: ParcelFilterInput @cost(weight: "10") order: [ParcelSortInput!] @cost(weight: "10")): [RegisteredParcel!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  preLoadParcels(where: ParcelFilterInput @cost(weight: "10") order: [ParcelSortInput!] @cost(weight: "10")): [RegisteredParcel!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  parcelImports: [ParcelImportHistory!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  parcelImport(id: UUID!): ParcelImport @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager", "WarehouseOperator" ]) @cost(weight: "10")
  routes(where: RouteFilterInput @cost(weight: "10") order: [RouteSortInput!] @cost(weight: "10")): [Route!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  users(search: String isActive: Boolean depotId: UUID zoneId: UUID where: UserManagementUserFilterInput @cost(weight: "10") order: [UserManagementUserSortInput!] @cost(weight: "10")): [UserManagementUser!]! @cost(weight: "10")
  user(id: UUID!): UserManagementUser @cost(weight: "10")
  userManagementLookups: UserManagementLookupsDto! @cost(weight: "10")
  vehicles(where: VehicleFilterInput @cost(weight: "10") order: [VehicleSortInput!] @cost(weight: "10")): [Vehicle!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  zones(where: ZoneFilterInput @cost(weight: "10") order: [ZoneSortInput!] @cost(weight: "10")): [Zone!]! @cost(weight: "10")
  zone(id: UUID!): Zone @cost(weight: "10")
}

type RegisteredParcel {
  id: UUID!
  trackingNumber: String!
  barcode: String!
  description: String
  serviceType: String!
  status: String!
  weight: Decimal!
  weightUnit: String!
  length: Decimal!
  width: Decimal!
  height: Decimal!
  dimensionUnit: String!
  declaredValue: Decimal!
  currency: String!
  estimatedDeliveryDate: DateTime!
  deliveryAttempts: Int!
  parcelType: String
  zoneId: UUID!
  zoneName: String
  depotId: UUID!
  depotName: String
  createdAt: DateTime!
  lastModifiedAt: DateTime
}

type Route {
  id: UUID!
  vehicleId: UUID!
  driverId: UUID!
  vehiclePlate: String @cost(weight: "10")
  driverName: String @cost(weight: "10")
  startDate: DateTime!
  endDate: DateTime
  startMileage: Int!
  endMileage: Int!
  totalMileage: Int! @cost(weight: "10")
  status: RouteStatus!
  parcelCount: Int! @cost(weight: "10")
  parcelsDelivered: Int! @cost(weight: "10")
  createdAt: DateTime!
}

type UserActionResultDto {
  success: Boolean!
  message: String!
}

type UserManagementDepotOptionDto {
  id: UUID!
  name: String!
}

type UserManagementLookupsDto {
  roles: [UserManagementRoleOptionDto!]!
  depots: [UserManagementDepotOptionDto!]!
  zones: [UserManagementZoneOptionDto!]!
}

type UserManagementRoleOptionDto {
  value: UserRole!
