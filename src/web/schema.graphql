}

type UserManagementUser {
  id: UUID!
  firstName: String!
  lastName: String!
  fullName: String! @cost(weight: "10")
  email: String
  phone: String
  role: String @cost(weight: "10")
  isActive: Boolean!
  isProtected: Boolean! @cost(weight: "10")
  depotId: UUID
  depotName: String @cost(weight: "10")
