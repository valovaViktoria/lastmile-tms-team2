  status: VehicleStatus!
  depotId: UUID!
  depotName: String @cost(weight: "10")
  totalRoutes: Int! @cost(weight: "10")
  routesCompleted: Int! @cost(weight: "10")
  totalMileage: Int! @cost(weight: "10")
